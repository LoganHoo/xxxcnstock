services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: xcnstock_scheduler
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - REDIS_HOST=49.233.10.199
      - REDIS_PORT=6379
      - REDIS_PASSWORD=100200
      - TZ=Asia/Shanghai
      - LOG_DIR=/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - xcnstock

networks:
  xcnstock:
    external: true
