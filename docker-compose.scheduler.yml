services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: xcnstock_scheduler
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - REDIS_HOST=${REDIS_HOST:-49.233.10.199}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - TZ=Asia/Shanghai
      - LOG_DIR=/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - xcnstock

networks:
  xcnstock:
    external: true
