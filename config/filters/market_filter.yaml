filters:
  market_cap_filter:
    enabled: true
    min_market_cap: 5000000000
    description: "排除市值低于50亿的股票"
  
  suspension_filter:
    enabled: true
    description: "排除停牌股票"
  
  price_filter:
    enabled: true
    min_price: 2.0
    max_price: 300.0
    description: "排除价格不在[2, 300]范围内的股票"
  
  volume_filter:
    enabled: false
    min_volume: 1000000
    description: "排除成交量低于100万的股票"
