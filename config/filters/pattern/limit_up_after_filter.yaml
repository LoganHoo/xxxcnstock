filter:
  name: "limit_up_after_filter"
  enabled: true
  description: "排除涨停后状态不佳的股票"
  
  params:
    max_days_after_limit: 5
    require_volume_shrink: true
  
  risk_level: "medium"
  category: "pattern"
  
  presets:
    conservative:
      description: "保守模式 - 涨停后状态要求严格"
      max_days_after_limit: 3
      require_volume_shrink: true
    
    standard:
      description: "标准模式 - 涨停后状态要求适中"
      max_days_after_limit: 5
      require_volume_shrink: true
    
    aggressive:
      description: "激进模式 - 涨停后状态要求宽松"
      max_days_after_limit: 10
      require_volume_shrink: false
