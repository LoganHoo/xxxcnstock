# 模拟交易配置
# Phase 1: 模拟交易部署

simulation:
  name: "量化交易系统 - 模拟交易"
  phase: 1
  start_date: "2026-04-19"
  duration_days: 14
  
# 策略配置
strategies:
  endstock_pick:
    enabled: true
    run_time: "14:35"  # 尾盘选股时间
    config:
      price_change_min: 2.0
      price_change_max: 6.0
      volume_ratio_min: 1.5
      volume_ratio_max: 5.0
      market_cap_min: 50
      market_cap_max: 500
      above_ma: true
      
  dragon_head:
    enabled: true
    config:
      min_consecutive_limitup: 3
      max_pullback_pct: 0.10
      pullback_days: 5
      min_market_cap: 30

# 风险管理
risk_management:
  initial_capital: 1000000  # 初始资金100万
  max_single_position: 0.20  # 单票最大20%
  stop_loss_pct: 0.05  # 止损5%
  take_profit_1_pct: 0.10  # 止盈10%减仓50%
  take_profit_2_pct: 0.20  # 止盈20%清仓
  
  # 熔断机制
  circuit_breaker:
    market_drop_2pct: -0.02  # 大盘跌2%暂停买入
    market_drop_5pct: -0.05  # 大盘跌5%清仓
    
  # 凯利公式
  kelly:
    half_kelly: true  # 使用半凯利
    max_position: 0.20  # 最大仓位限制

# 数据源配置
data_source:
  primary: "tushare"
  backup: ["akshare", "baostock"]
  kline_period: "daily"
  history_years: 3

# 回测配置
backtest:
  initial_cash: 1000000
  commission: 0.0003  # 手续费万3
  slippage: 0.001  # 滑点千1

# 日志配置
logging:
  level: "INFO"
  file: "logs/simulation.log"
  max_size: "100MB"
  backup_count: 7

# 监控配置
monitoring:
  enabled: true
  report_time: "15:30"  # 每日报告时间
  metrics:
    - daily_pnl
    - total_return
    - max_drawdown
    - win_rate
    - sharpe_ratio
