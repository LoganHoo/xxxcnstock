# Redis 配置文件
# XCNStock 数据流水线 - 缓存和分布式锁

# ==================== 基础配置 ====================

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 保护模式
protected-mode no

# 密码认证 (建议在生产环境启用)
# requirepass your_redis_password

# 数据库数量
databases 16

# ==================== 内存配置 ====================

# 最大内存限制 (根据服务器配置调整)
# maxmemory 256mb

# 内存淘汰策略
maxmemory-policy allkeys-lru

# ==================== 持久化配置 ====================

# RDB 快照配置
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# RDB 文件保存目录
dir /data

# AOF 配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ==================== 连接配置 ====================

# 最大客户端连接数
maxclients 10000

# TCP 连接超时
timeout 0
tcp-keepalive 300

# ==================== 日志配置 ====================

# 日志级别
loglevel notice

# 日志文件
logfile ""

# ==================== 性能优化 ====================

# 禁用 THP (透明大页)
# 需要在宿主机上执行: echo never > /sys/kernel/mm/transparent_hugepage/enabled

# 启用慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# ==================== 安全配置 ====================

# 禁用危险命令 (生产环境建议启用)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""
# rename-command DEBUG ""
# rename-command SHUTDOWN ""

# ==================== 监控配置 ====================

# 启用延迟监控
latency-monitor-threshold 100
