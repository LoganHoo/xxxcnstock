factor:
  name: turnover
  category: volume_price
  description: "换手率因子 - 活跃度指标"
  version: "1.0"
  
  params:
    default:
      period: 5
    
    presets:
      conservative:
        period: 10
        description: "保守型 - 长周期换手率"
      
      aggressive:
        period: 3
        description: "激进型 - 短周期换手率"
      
      standard:
        period: 5
        description: "标准型 - 经典换手率"
  
  scoring:
    weight: 0.05
    threshold: 30
    
    rules:
      - condition: "换手率 > 10% (极度活跃)"
        score: 90
      - condition: "换手率 5-10%"
        score: 75
      - condition: "换手率 3-5%"
        score: 60
      - condition: "换手率 1-3%"
        score: 50
      - condition: "换手率 < 1% (不活跃)"
        score: 40
  
  optimization:
    param_ranges:
      period: [3, 5, 7, 10]
