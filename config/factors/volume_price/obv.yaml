factor:
  name: obv
  category: volume_price
  description: "OBV因子 - 能量潮指标"
  version: "1.0"
  
  params:
    default:
      period: 20
    
    presets:
      conservative:
        period: 30
        description: "保守型 - 长周期OBV"
      
      aggressive:
        period: 10
        description: "激进型 - 短周期OBV"
      
      standard:
        period: 20
        description: "标准型 - 经典OBV"
  
  scoring:
    weight: 0.04
    threshold: 30
    
    rules:
      - condition: "OBV/OBV_MA > 1.5"
        score: 90
      - condition: "OBV/OBV_MA 1.2-1.5"
        score: 80
      - condition: "OBV/OBV_MA 1.0-1.2"
        score: 70
      - condition: "OBV/OBV_MA 0.8-1.0"
        score: 50
      - condition: "OBV/OBV_MA 0.5-0.8"
        score: 40
      - condition: "OBV/OBV_MA < 0.5"
        score: 30
  
  optimization:
    param_ranges:
      period: [10, 15, 20, 30]
