factor:
  name: cci
  category: technical
  description: "CCI因子 - 顺势指标"
  version: "1.0"
  
  params:
    default:
      period: 14
    
    presets:
      conservative:
        period: 20
        description: "保守型 - 长周期CCI"
      
      aggressive:
        period: 10
        description: "激进型 - 短周期CCI"
      
      standard:
        period: 14
        description: "标准型 - 经典CCI"
  
  scoring:
    weight: 0.04
    threshold: 30
    
    rules:
      - condition: "CCI < -200 (极度超卖)"
        score: 90
      - condition: "-200 <= CCI < -100"
        score: 80
      - condition: "-100 <= CCI < 0"
        score: 60
      - condition: "0 <= CCI < 100"
        score: 50
      - condition: "100 <= CCI < 200"
        score: 30
      - condition: "CCI >= 200 (极度超买)"
        score: 20
  
  optimization:
    param_ranges:
      period: [10, 14, 20, 30]
