factor:
  name: mtm
  category: technical
  description: "MTM因子 - 动量指标"
  version: "1.0"
  
  params:
    default:
      period: 12
    
    presets:
      conservative:
        period: 20
        description: "保守型 - 长周期MTM"
      
      aggressive:
        period: 6
        description: "激进型 - 短周期MTM"
      
      standard:
        period: 12
        description: "标准型 - 经典MTM"
  
  scoring:
    weight: 0.04
    threshold: 30
    
    rules:
      - condition: "MTM/价格 < -10%"
        score: 90
      - condition: "-10% <= MTM/价格 < -5%"
        score: 70
      - condition: "-5% <= MTM/价格 < 0%"
        score: 55
      - condition: "0% <= MTM/价格 < 5%"
        score: 50
      - condition: "5% <= MTM/价格 < 10%"
        score: 40
      - condition: "MTM/价格 >= 10%"
        score: 30
  
  optimization:
    param_ranges:
      period: [6, 10, 12, 20]
