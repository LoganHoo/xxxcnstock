# 策略3: 均衡配置策略
# 特点：中等过滤 + 因子与信号并重
# 适用：正常市场环境，震荡或小幅趋势时
# 目标：平衡风险与收益

strategy:
  name: "均衡配置策略"
  description: "中等过滤，均衡配置因子与信号，追求稳健收益"
  version: "1.0"
  preset: "standard"

# ==================== 过滤阶段 ====================
filters:
  # 第一层：排除高风险股票
  - name: "st_filter"
    preset: "standard"
    enabled: true
    params:
      st_patterns:
        - "ST"
        - "*ST"

  - name: "delisting_filter"
    enabled: true

  - name: "new_stock_filter"
    enabled: true
    params:
      min_list_days: 60  # 排除上市不足60天

  # 第二层：适度流动性过滤
  - name: "volume_ratio_filter"
    preset: "standard"
    enabled: true
    params:
      min_ratio: 1.0
      max_ratio: 5.0

  - name: "turnover_rate_filter"
    preset: "standard"
    enabled: true
    params:
      min_turnover: 0.5  # 日均换手率 > 0.5%

  # 第三层：价格区间过滤
  - name: "price_filter"
    preset: "standard"
    enabled: true
    params:
      min_price: 2.0
      max_price: 300.0

  # 第四层：适度估值过滤
  - name: "valuation_filter"
    preset: "standard"
    enabled: true
    params:
      max_pe: 100
      max_pb: 10

  # 第五层：适度技术形态过滤
  - name: "limit_up_trap_filter"
    enabled: true

  - name: "over_hyped_filter"
    enabled: true

# ==================== 因子阶段 ====================
factors:
  # 技术指标因子 (权重35%)
  technical:
    - name: "ma_trend"
      weight: 0.09
      threshold: 55
      params:
        short_period: 5
        mid_period: 10
        long_period: 20

    - name: "macd"
      weight: 0.07
      threshold: 45
      params:
        fast: 12
        slow: 26
        signal: 9

    - name: "rsi"
      weight: 0.05
      threshold: 35
      params:
        period: 14

    - name: "kdj"
      weight: 0.05
      threshold: 35
      params:
        n: 9
        m1: 3
        m2: 3

    - name: "bollinger"
      weight: 0.04
      threshold: 35
      params:
        period: 20
        std_dev: 2

    - name: "atr"
      weight: 0.03
      threshold: 35
      params:
        period: 14

    - name: "cci"
      weight: 0.02
      threshold: 35
      params:
        period: 14

  # 量价因子 (权重35%)
  volume_price:
    - name: "volume_ratio"
      weight: 0.10
      threshold: 45
      params:
        period: 5

    - name: "turnover"
      weight: 0.08
      threshold: 35
      params:
        period: 5

    - name: "mfi"
      weight: 0.07
      threshold: 35
      params:
        period: 14

    - name: "v_ratio10"
      weight: 0.05
      threshold: 40

    - name: "obv"
      weight: 0.03
      threshold: 45
      params:
        period: 20

    - name: "vr"
      weight: 0.02
      threshold: 35
      params:
        period: 26

  # 市场情绪因子 (权重30%)
  market:
    - name: "market_trend"
      weight: 0.08
      threshold: 45
      params:
        period: 20

    - name: "market_sentiment"
      weight: 0.08
      threshold: 45
      params:
        period: 14

    - name: "market_temperature"
      weight: 0.07
      threshold: 45
      params:
        period: 20

    - name: "market_breadth"
      weight: 0.04
      threshold: 40
      params:
        period: 10

    - name: "limit_up_score"
      weight: 0.03
      threshold: 40

# ==================== 主力量化信号 ====================
mainforce:
  enabled: true
  weight: 0.50  # 主力信号占综合评分50%
  signals:
    - name: "S1_limit_up"
      enabled: true
      params:
        lookback_days: 20
        min_volume_ratio: 1.5
        max_consolidation_pct: 5

    - name: "S2_gap"
      enabled: true
      params:
        lookback_days: 3
        max_fill_pct: 20

    - name: "S3_consecutive"
      enabled: true
      params:
        lookback_days: 3

    - name: "S4_breakout"
      enabled: true
      params:
        volume_multiplier: 2.0
        lookback_days: 20

# ==================== 选股规则 ====================
selection:
  top_n: 30
  min_score: 60
  max_stocks_per_industry: 4  # 单行业最多4只
  position_size: 0.03  # 单只仓位3%

# ==================== 风控规则 ====================
risk_control:
  max_positions: 25
  max_single_loss: -0.10  # 单只最大亏损-10%
  max_total_loss: -0.20   # 总回撤-20%止损
  min_market_sentiment: 35  # 市场情绪低于35不建仓
