# XCNStock 定时任务配置
# 用于管理所有定时任务的执行时间和参数
#
# 流水线设计原则：
# 1. 数据采集优先（16:00盘后）
# 2. 质检通过后才进行复盘分析
# 3. 复盘报告与晚间报告解耦
# 4. 报告包含数据新鲜度和完整性验证

# 全局配置
global:
  timezone: "Asia/Shanghai"
  shell: "/bin/bash"
  path: "/usr/local/bin:/usr/bin:/bin"
  log_file: "/app/logs/cron.log"
  working_dir: "/app"
  script_base: "scripts/pipeline"
  # 任务状态检查配置
  use_redis_lock: true
  redis_lock_timeout: 3600  # 锁超时时间(秒)
  # 重试机制配置
  retry_enabled: true
  max_retries: 3
  retry_delay: 60  # 重试间隔(秒)
  # Cron 健康检查配置
  health_check_enabled: true
  health_check_interval: 300  # 5分钟检查一次

# 定时任务定义
tasks:
  # ========== 交易日盘后流水线 ==========

  # 16:00 - 基础数据采集（收盘后）
  - name: "data_fetch"
    description: "【1.数据采集】采集A股所有行情数据（日线）- 初始采集"
    schedule: "0 16 * * 1-5"  # 交易日 16:00（收盘后采集）
    script: "scripts/pipeline/data_collect.py"
    enabled: true
    day_type: "weekday"
    timeout: 5400  # 90分钟（5400秒）
    run_once: true  # 只执行一次，不进行重试采集

  # 16:30 - 断点续传（如果质检未通过）
  - name: "data_fetch_retry"
    description: "【1.5.断点续传】检查并补充未完成的股票数据"
    schedule: "30 16 * * 1-5"  # 交易日 16:30
    script: "scripts/pipeline/data_collect.py --retry"
    enabled: true
    day_type: "weekday"
    timeout: 3600  # 60分钟
    retry_mode: true  # 断点续传模式
    depends_on: "data_fetch"
    skip_if_passed: "data_quality_check"  # 如果质检已通过则跳过

  # 17:30 - 断点续传（如果质检仍未通过）
  - name: "data_fetch_retry2"
    description: "【1.6.断点续传】第二轮补充数据"
    schedule: "30 17 * * 1-5"  # 交易日 17:30
    script: "scripts/pipeline/data_collect.py --retry"
    enabled: true
    day_type: "weekday"
    timeout: 3600  # 60分钟
    retry_mode: true
    depends_on: "data_fetch_retry"
    skip_if_passed: "data_quality_check"  # 如果质检已通过则跳过

  # 17:00 - 数据质检
  - name: "data_quality_check"
    description: "【2.数据质检】验证今日数据完整度"
    schedule: "0 17 * * 1-5"  # 交易日 17:00
    script: "scripts/pipeline/data_audit.py"
    enabled: true
    day_type: "weekday"
    timeout: 600  # 10分钟
    depends_on: "data_fetch"

  # 19:30 - CVD指标计算（晚间CVD分析）
  - name: "calculate_cvd"
    description: "【2.5.CVD计算】计算60日累积成交量差指标"
    schedule: "15 17 * * 1-5"  # 交易日 17:15（质检后）
    script: "scripts/calculate_cvd.py"
    enabled: true
    day_type: "weekday"
    timeout: 600  # 10分钟
    depends_on: "data_quality_check"  # 必须等待质检通过

  # 17:30 - 当日复盘分析
  - name: "market_review"
    description: "【3.复盘分析】计算涨跌停家数、板块强度、CVD资金净流入"
    schedule: "30 17 * * 1-5"  # 交易日 17:30
    script: "scripts/pipeline/daily_review.py"
    enabled: true
    day_type: "weekday"
    timeout: 900  # 15分钟
    depends_on: "data_quality_check"  # 必须等待质检通过

  # 17:45 - 选股复盘（验证昨日推荐表现）
  - name: "picks_review"
    description: "【3.5.选股复盘】验证昨日推荐股票表现"
    schedule: "45 17 * * 1-5"  # 交易日 17:45
    script: "scripts/pipeline/stock_pick.py"
    enabled: true
    day_type: "weekday"
    timeout: 600
    depends_on: "market_review"

  # 18:00 - 推送完整复盘报告
  - name: "review_report"
    description: "【4.完整复盘】大盘情况、昨日推荐追踪、OKR、AI复盘+人工修正"
    schedule: "0 18 * * 1-5"  # 交易日 18:00
    script: "scripts/send_review_report.py"
    enabled: true
    day_type: "weekday"
    timeout: 600
    depends_on: "market_review"

  # 19:00 - 推送精简复盘快报
  - name: "review_brief"
    description: "【4b.复盘快报】包含今日热点、资金流向、DQ质检摘要"
    schedule: "0 19 * * 1-5"  # 交易日 19:00
    script: "scripts/pipeline/morning_push.py"
    enabled: true
    day_type: "weekday"
    timeout: 300
    depends_on: "review_report"

  # 19:30 - 更新推荐股票跟踪（复盘报告后立即执行）

  # 20:00 - 预计算技术指标
  - name: "precompute"
    description: "【5.预计算】计算技术指标评分"
    schedule: "0 20 * * 1-5"  # 交易日 20:00
    script: "scripts/pipeline/precompute.py"
    enabled: true
    day_type: "weekday"
    timeout: 1200  # 20分钟
    depends_on: "data_quality_check"  # 必须等待质检通过

  # 20:30 - 晚间综合预测
  - name: "night_analysis"
    description: "【6.晚间分析】结合消息面的选股推荐"
    schedule: "30 20 * * 1-5"  # 交易日 20:30
    script: "scripts/pipeline/night_picks.py"
    enabled: true
    day_type: "weekday"
    timeout: 900  # 15分钟
    env:
      PICK_TYPE: "night"
    depends_on: "precompute"  # 必须等待预计算完成

  # ========== 晨间流水线 ==========

  # 08:30 - 更新晨间数据
  - name: "morning_data"
    description: "【7.晨间更新】更新隔夜外盘数据"
    schedule: "30 8 * * 1-5"  # 交易日 08:30
    script: "scripts/pipeline/morning_update.py"
    enabled: true
    day_type: "weekday"
    timeout: 600  # 10分钟

  # 08:32 - 采集宏观数据
  - name: "collect_macro"
    description: "【7.1宏观数据】采集美元指数、美债、人民币等宏观指标"
    schedule: "32 8 * * 1-5"  # 交易日 08:32
    script: "scripts/collect_macro_data.py"
    enabled: true
    day_type: "weekday"
    timeout: 120

  # 08:34 - 采集石油美元数据
  - name: "collect_oil_dollar"
    description: "【7.2石油美元】采集原油价格及石油美元动态"
    schedule: "34 8 * * 1-5"  # 交易日 08:34
    script: "scripts/collect_oil_dollar.py"
    enabled: true
    day_type: "weekday"
    timeout: 120

  # 08:36 - 采集大宗商品数据
  - name: "collect_commodities"
    description: "【7.3大宗商品】采集黄金、铜、碳酸锂等大宗商品价格"
    schedule: "36 8 * * 1-5"  # 交易日 08:36
    script: "scripts/collect_commodities.py"
    enabled: true
    day_type: "weekday"
    timeout: 120

  # 08:38 - 采集情绪数据
  - name: "collect_sentiment"
    description: "【7.4情绪数据】采集炸板率、恐慌贪婪指数等情绪指标"
    schedule: "38 8 * * 1-5"  # 交易日 08:38
    script: "scripts/collect_sentiment.py"
    enabled: true
    day_type: "weekday"
    timeout: 120

  # 08:40 - 采集新闻数据
  - name: "collect_news"
    description: "【7.5新闻数据】采集国内外重要财经新闻"
    schedule: "40 8 * * 1-5"  # 交易日 08:40
    script: "scripts/collect_news.py"
    enabled: true
    day_type: "weekday"
    timeout: 120

  # 08:45 - 推送晨前哨报
  - name: "morning_report"
    description: "【8.晨前哨报】外盘+大盘+宏观+石油+大宗+情绪+事件+AI建议"
    schedule: "45 8 * * 1-5"  # 交易日 08:45
    script: "scripts/pipeline/send_morning_shao.py"
    enabled: true
    day_type: "weekday"
    timeout: 300
    depends_on: "collect_news"

  # 09:09 - 量化决策报告（资金行为学策略）
  - name: "fund_behavior_report"
    description: "【9.量化决策】资金行为学策略执行与报告推送"
    schedule: "9 9 * * 1-5"  # 交易日 09:09（开盘后）
    script: "scripts/run_fund_behavior_strategy.py"
    enabled: true
    day_type: "weekday"
    timeout: 600
    depends_on: "morning_data"

  # ========== 非交易日任务 ==========

  # 06:00 - 更新外盘大盘指数（已废弃，由morning_data统一处理）
  # - name: "update_foreign_index"
  #   description: "【9.外盘指数】更新美股、亚洲股指数据"
  #   schedule: "0 6 * * *"  # 每天凌晨 06:00
  #   script: "scripts/pipeline/update_foreign.py"
  #   enabled: false  # 禁用，功能合并到morning_data
  #   day_type: "daily"
  #   timeout: 600  # 10分钟

  # 16:05 - 更新中国大盘指数数据（串行紧随data_fetch，避免资源竞争）
  - name: "update_index_data"
    description: "【10.大盘指数】更新上证、深证、创业板等指数"
    schedule: "5 16 * * 1-5"  # 交易日 16:05
    script: "scripts/pipeline/fetch_index.py"
    enabled: true
    day_type: "weekday"
    timeout: 600
    depends_on: "data_fetch"  # 必须等待数据采集完成，避免API限流

  # ========== 系统维护任务 ==========

  # APScheduler 心跳监控 - 每5分钟检查一次
  - name: "scheduler_watchdog"
    description: "【SYS】APScheduler 心跳监控与故障恢复"
    schedule: "*/5 * * * *"  # 每5分钟
    script: "scripts/scheduler_watchdog.sh"
    enabled: true
    day_type: "daily"
    timeout: 60

  # 19:30 - 更新推荐股票跟踪（复盘报告后立即执行）
  - name: "update_tracking"
    description: "【11.跟踪更新】更新推荐股票跟踪数据"
    schedule: "30 19 * * 1-5"  # 交易日 19:30（复盘报告后）
    script: "scripts/pipeline/update_tracking.py"
    enabled: true
    day_type: "weekday"
    timeout: 600  # 10分钟
    depends_on: "review_report"  # 等待复盘报告发出

  # 20:30 - 人工数据验证
  - name: "manual_verification"
    description: "【12.人工验证】随机抽检3股+第三方验证1股，生成HTML报告并发送邮件"
    schedule: "30 20 * * 1-5"  # 交易日 20:30（数据采集和质检之后）
    script: "scripts/manual_verification.py"
    enabled: true
    day_type: "weekday"
    timeout: 600  # 10分钟
    depends_on: "data_quality_check"  # 必须等待质检通过

# 任务分组（注意：disabled的任务不在此列）
groups:
  trading_day_afternoon:
    description: "盘后流水线（16:00-19:00）"
    tasks:
      - data_fetch
      - data_fetch_retry
      - data_fetch_retry2
      - data_quality_check
      - market_review
      - review_report
      - update_index_data

  trading_day_evening:
    description: "晚间流水线（20:00-21:00）"
    tasks:
      - precompute
      - night_analysis
      - manual_verification

  trading_day_morning:
    description: "晨间流水线（08:30-09:15）"
    tasks:
      - morning_data
      - morning_report
      - fund_behavior_report
      - update_tracking

  daily:
    description: "每日凌晨任务"
    tasks:
      - update_foreign_index

# 环境变量配置
# 注意：敏感信息已迁移到 .env 文件
environment:
  EMAIL_USE_API: "false"
  EMAIL_API_URL: "http://192.168.1.168:2000/send_email"
  NOTIFICATION_EMAILS: "287363@qq.com"
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Shanghai"
  AI_API_URL: "http://192.168.1.168:2000"
