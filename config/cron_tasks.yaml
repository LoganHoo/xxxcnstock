# 当前未接线的规划态任务。统一显式禁用，避免进入调度器执行面。
planned_tasks:
  - name: "kline_pre_market"
    description: "【涨停系统-0.盘前K线】快速采集当日开盘价、成交量（为09:26选股准备）"
    schedule: "10 9 * * 1-5"
    script: "scripts/pipeline/kline_collect.py"
    args: ["--mode", "pre"]
    enabled: false
    status: "planned"
    reason: "脚本未接线，当前仓库不存在 scripts/pipeline/kline_collect.py"
    day_type: "weekday"
    timeout: 600
    depends_on: "system_health_check"
    alert_on_failure: true

  - name: "kline_post_market"
    description: "【涨停系统-0.盘后K线】完整采集日线数据，补充历史数据"
    schedule: "2 16 * * 1-5"
    script: "scripts/pipeline/kline_collect.py"
    args: ["--mode", "post"]
    enabled: false
    status: "planned"
    reason: "脚本未接线，当前仓库不存在 scripts/pipeline/kline_collect.py"
    day_type: "weekday"
    timeout: 1800
    depends_on: "data_fetch"
    alert_on_failure: true

# ========== 任务分组（按业务阶段划分）==========
groups:
  # 阶段0: 系统准备阶段
  system_preparation:
    description: "【阶段0】系统准备 - 环境检查与资源保障"
    tasks:
      - system_health_check
    priority: "critical"

  # 阶段1: 数据采集阶段
  data_collection:
    description: "【阶段1】数据采集 - 收盘后数据获取与质量保障"
    tasks:
      - data_fetch
      - data_fetch_retry
      - update_index_data
      - dragon_tiger_fetch
    priority: "critical"
    depends_on: "system_preparation"
    timeout: 5400  # 90分钟总超时

  # 阶段2: 数据质检阶段
  data_quality:
    description: "【阶段2】数据质检 - 审计与指标计算"
    tasks:
      - data_audit_unified
      - calculate_cvd
    priority: "critical"
    depends_on: "data_collection"

  # 阶段3: 复盘分析阶段
  review_analysis:
    description: "【阶段3】复盘分析 - 市场回顾与选股验证"
    tasks:
      - market_review
      - picks_review
      - drawdown_analysis
      - daily_selection_review
    priority: "high"
    depends_on: "data_quality"

  # 阶段4: 报告生成阶段
  report_generation:
    description: "【阶段4】报告生成 - 复盘报告与快报"
    tasks:
      - review_report
      - review_brief
    priority: "high"
    depends_on: "review_analysis"

  # 阶段5: 跟踪更新阶段
  tracking_update:
    description: "【阶段5】跟踪更新 - 推荐股票跟踪"
    tasks:
      - update_tracking
    priority: "medium"
    depends_on: "report_generation"

  # 阶段6: 晚间分析阶段
  evening_analysis:
    description: "【阶段6】晚间分析 - 技术指标预计算与选股"
    tasks:
      - precompute
      - night_analysis
      - manual_verification
    priority: "medium"
    depends_on: "tracking_update"

  # 阶段7: 晨间准备阶段
  morning_preparation:
    description: "【阶段7】晨间准备 - 开盘前数据收集"
    tasks:
      - morning_data
      - collect_macro
      - collect_oil_dollar
      - collect_commodities
      - collect_sentiment
      - collect_news
      - prediction_correction_check
      - market_analysis
      - morning_report
    priority: "critical"

  # 阶段8: 核心决策阶段
  core_decision:
    description: "【阶段8】核心决策 - 09:26资金行为学策略执行"
    tasks:
      - fund_behavior_resource_prepare
      - fund_behavior_resource_validate
      - fund_behavior_guardian_check
      - fund_behavior_report
    priority: "critical"
    depends_on: "morning_preparation"

  # 阶段9: 监控验证阶段
  monitoring_verification:
    description: "【阶段9】监控验证 - 数据完整性检查与监控"
    tasks:
      - data_integrity_check
      - morning_monitoring_summary
      - evening_monitoring_summary
    priority: "low"

  # 新闻采集阶段（每日）
  news_collection:
    description: "【每日】新闻联播采集与AI分析"
    tasks:
      - collect_news_cctv_midnight
      - collect_news_cctv_morning
      - analyze_cctv_news
    priority: "high"

  # 周末维护阶段
  weekend_maintenance:
    description: "【周末】批量更新与系统维护"
    tasks:
      - weekly_multi_period_update
      - cache_cleanup
    priority: "low"

  # 系统监控阶段（持续）- 已禁用缺失脚本
  # system_monitoring:
  #   description: "【持续】系统监控与保障"
  #   tasks:
  #     - scheduler_watchdog
  #     - generate_dashboard
  #   priority: "low"

# ========== 环境变量配置 ==========
# 注意：敏感信息已迁移到 .env 文件
# 以下配置将被注入到任务执行环境中，实际值从 .env 文件读取
# 格式说明：${VAR_NAME} 表示从环境变量读取，若未设置则使用默认值
environment:
  # 邮件通知配置（从.env读取）
  EMAIL_USE_API: "false"
  EMAIL_API_URL: "http://localhost:2000/send_email"
  NOTIFICATION_EMAILS: "287363@qq.com"
  # 系统配置
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Shanghai"
  # AI服务配置（从.env读取）
  AI_API_URL: "http://localhost:2000"
  # 数据库配置（从.env读取）
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"
  # 注意：以上值为默认值，实际运行时会被 .env 文件中的值覆盖
