  #   timeout: 60
  #   alert_on_failure: false
  #   singleton: true

  # 08:55 - 早间监控摘要邮件（已禁用：脚本不存在）
  # - name: "morning_monitoring_summary"
  #   description: "【监控】发送晨间任务监控摘要"
