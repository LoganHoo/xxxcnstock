# Prometheus 配置文件
# 用于监控 XCNStock 数据流水线

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'xcnstock'
    replica: '{{.ExternalURL}}'

# 告警规则
rule_files:
  - /etc/prometheus/rules/*.yml

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# 采集目标
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # XCNStock 应用监控
  - job_name: 'xcnstock'
    static_configs:
      - targets: ['xcnstock-fetcher:9090']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # Redis 监控 (通过 redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # MySQL 监控 (通过 mysqld_exporter)
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql:3306']
    scrape_interval: 30s

  # Kestra 监控
  - job_name: 'kestra'
    static_configs:
      - targets: ['kestra:8082']
    metrics_path: /api/v1/metrics
    scrape_interval: 30s
