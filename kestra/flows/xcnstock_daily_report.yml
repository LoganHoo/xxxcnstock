id: xcnstock_daily_report
namespace: xcnstock

description: |
  XCNStock 每日选股报告工作流
  
  功能：
  1. 指标计算（CVD、技术因子等）
  2. 选股策略执行（主力痕迹、资金共振）
  3. 生成选股报告
  4. 保存选股结果到数据库
  5. 发送报告通知
  6. 生成复盘数据（用于后续验证）
  
  依赖：需要先执行 xcnstock_data_collection 完成数据采集

labels:
  env: production
  project: xcnstock
  type: daily_report

variables:
  project_root: /projects/xxxcnstock
  python_path: "{{ vars.project_root }}"
  log_level: INFO

inputs:
  - id: report_date
    type: STRING
    defaults: "{{ trigger.date ?? now() | date('yyyy-MM-dd') }}"
    description: 报告日期 (YYYY-MM-DD)

  - id: skip_if_no_data
    type: BOOLEAN
    defaults: true
    description: 无数据时跳过执行

tasks:
  # ========== 阶段1: 检查数据可用性 ==========
  - id: check_data_ready
    type: io.kestra.plugin.scripts.python.Script
    description: 检查当日数据是否已采集
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
    beforeCommands:
      - pip install pyarrow -q
    script: |
      import sys
      import os
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      
      import logging
      import json
      from pathlib import Path
      from datetime import datetime
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.check")
      
      report_date = "{{ inputs.report_date }}"
      skip_if_no_data = "{{ inputs.skip_if_no_data }}" == "true"
      
      logger.info(f"检查 {report_date} 数据可用性...")
      
      # 检查采集报告是否存在
      collection_report = Path(f"{{ vars.project_root }}/data/collection_report_{report_date}.json")
      
      if not collection_report.exists():
          logger.warning(f"未找到采集报告: {collection_report}")
          if skip_if_no_data:
              logger.info("设置 skip_if_no_data=true，将跳过执行")
              # 创建标记文件
              with open("/tmp/skip_report", 'w') as f:
                  f.write("skip")
          else:
              raise Exception("数据未就绪，无法生成报告")
      else:
          logger.info("数据已就绪")
          # 删除可能存在的跳过标记
          if os.path.exists("/tmp/skip_report"):
              os.remove("/tmp/skip_report")
    timeout: PT5M

  # ========== 阶段2: 指标计算 ==========
  - id: calculate_indicators
    type: io.kestra.plugin.scripts.python.Script
    description: 计算技术指标（CVD、量价因子等）
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
      LOG_LEVEL: "{{ vars.log_level }}"
    beforeCommands:
      - pip install polars pandas pyarrow numpy -q
    script: |
      import sys
      import os
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      
      import logging
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.indicators")
      
      # 检查是否需要跳过
      if os.path.exists("/tmp/skip_report"):
          logger.info("检测到跳过标记，跳过指标计算")
          exit(0)
      
      logger.info("=" * 60)
      logger.info("阶段2: 计算技术指标")
      logger.info("=" * 60)
      
      from scripts.pipeline.cvd_calculator import main as cvd_main
      from scripts.pipeline.precompute import main as precompute_main
      
      try:
          # 计算CVD指标
          logger.info("计算CVD指标...")
          cvd_main()
          
          # 预计算其他指标
          logger.info("预计算技术因子...")
          precompute_main()
          
          logger.info("指标计算完成")
          
      except Exception as e:
          logger.error(f"指标计算失败: {e}")
          raise
    timeout: PT30M

  # ========== 阶段3: 选股策略执行 ==========
  - id: execute_stock_selection
    type: io.kestra.plugin.scripts.python.Script
    description: 执行选股策略（主力痕迹+资金共振）
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
      LOG_LEVEL: "{{ vars.log_level }}"
    beforeCommands:
      - pip install polars pandas pyarrow numpy -q
    script: |
      import sys
      import os
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      
      import logging
      import json
      from datetime import datetime
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.selection")
      
      # 检查是否需要跳过
      if os.path.exists("/tmp/skip_report"):
          logger.info("检测到跳过标记，跳过选股")
          exit(0)
      
      report_date = "{{ inputs.report_date }}"
      
      logger.info("=" * 60)
      logger.info("阶段3: 执行选股策略")
      logger.info("=" * 60)
      
      from scripts.pipeline.stock_pick import main as pick_main
      from scripts.pipeline.stock_selection import main as selection_main
      
      try:
          # 执行选股
          logger.info("执行主力痕迹选股...")
          pick_main()
          
          # 执行评分排序
          logger.info("执行选股评分...")
          selection_main()
          
          logger.info("选股策略执行完成")
          
      except Exception as e:
          logger.error(f"选股失败: {e}")
          raise
    timeout: PT30M

  # ========== 阶段4: 保存选股结果 ==========
  - id: save_selection_results
    type: io.kestra.plugin.scripts.python.Script
    description: 保存选股结果到数据库
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
      LOG_LEVEL: "{{ vars.log_level }}"
    script: |
      import sys
      import os
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      
      import logging
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.save")
      
      # 检查是否需要跳过
      if os.path.exists("/tmp/skip_report"):
          logger.info("检测到跳过标记，跳过保存")
          exit(0)
      
      logger.info("=" * 60)
      logger.info("阶段4: 保存选股结果")
      logger.info("=" * 60)
      
      from scripts.save_selection_to_db import main as save_main
      
      try:
          save_main()
          logger.info("选股结果已保存到数据库")
      except Exception as e:
          logger.error(f"保存失败: {e}")
          # 保存失败不阻断流程
    timeout: PT10M

  # ========== 阶段5: 生成报告 ==========
  - id: generate_report
    type: io.kestra.plugin.scripts.python.Script
    description: 生成选股报告
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
      LOG_LEVEL: "{{ vars.log_level }}"
    script: |
      import sys
      import os
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      
      import logging
      import json
      from datetime import datetime
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.report")
      
      report_date = "{{ inputs.report_date }}"
      
      # 检查是否需要跳过
      if os.path.exists("/tmp/skip_report"):
          logger.info("数据未就绪，生成空报告")
          
          # 生成跳过报告
          skip_report = {
              "report_date": report_date,
              "status": "skipped",
              "reason": "数据未就绪",
              "generated_at": datetime.now().isoformat()
          }
          
          report_path = f"{{ vars.project_root }}/data/daily_report_{report_date}.json"
          with open(report_path, 'w') as f:
              json.dump(skip_report, f, indent=2)
          
          logger.info(f"跳过报告已生成: {report_path}")
          exit(0)
      
      logger.info("=" * 60)
      logger.info("阶段5: 生成选股报告")
      logger.info("=" * 60)
      
      from scripts.pipeline.night_picks import main as night_picks_main
      
      try:
          night_picks_main()
          logger.info("选股报告生成完成")
      except Exception as e:
          logger.error(f"报告生成失败: {e}")
          raise
    timeout: PT15M

  # ========== 阶段6: 生成复盘数据 ==========
  - id: generate_review_data
    type: io.kestra.plugin.scripts.python.Script
    description: 生成复盘数据（用于次日验证）
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
      LOG_LEVEL: "{{ vars.log_level }}"
    script: |
      import sys
      import os
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      
      import logging
      import json
      from datetime import datetime
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.review")
      
      # 检查是否需要跳过
      if os.path.exists("/tmp/skip_report"):
          logger.info("检测到跳过标记，跳过复盘数据生成")
          exit(0)
      
      report_date = "{{ inputs.report_date }}"
      
      logger.info("=" * 60)
      logger.info("阶段6: 生成复盘数据")
      logger.info("=" * 60)
      
      # 创建复盘数据文件
      review_data = {
          "report_date": report_date,
          "selection_time": datetime.now().isoformat(),
          "verification_status": "pending",
          "next_day_performance": None,
          "verification_date": None
      }
      
      review_path = f"{{ vars.project_root }}/data/review_pending_{report_date}.json"
      with open(review_path, 'w') as f:
          json.dump(review_data, f, indent=2)
      
      logger.info(f"复盘数据已创建: {review_path}")
      logger.info("次日将验证今日选股表现")
    timeout: PT5M

  # ========== 阶段7: 发送通知 ==========
  - id: send_notification
    type: io.kestra.plugin.scripts.python.Script
    description: 发送报告通知
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
    script: |
      import sys
      import os
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      
      import logging
      import json
      from datetime import datetime
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.notify")
      
      report_date = "{{ inputs.report_date }}"
      
      logger.info("=" * 60)
      logger.info("阶段7: 发送通知")
      logger.info("=" * 60)
      
      # 检查是否跳过
      if os.path.exists("/tmp/skip_report"):
          message = f"【跳过】{report_date} 每日选股报告\n\n数据未就绪，跳过今日选股。"
          status = "SKIPPED"
      else:
          # 读取选股结果
          try:
              with open(f"{{ vars.project_root }}/data/daily_report_{report_date}.json", 'r') as f:
                  report = json.load(f)
              
              picks = report.get('picks', [])
              message = f"【完成】{report_date} 每日选股报告\n\n"
              message += f"选股数量: {len(picks)} 只\n"
              
              if picks:
                  message += "\nTop 5:\n"
                  for i, pick in enumerate(picks[:5], 1):
                      message += f"{i}. {pick.get('code', 'N/A')} - {pick.get('score', 0):.1f}分\n"
              
              status = "SUCCESS"
              
          except Exception as e:
              message = f"【完成】{report_date} 每日选股报告\n\n报告已生成，但读取详情失败: {e}"
              status = "SUCCESS"
      
      # 发送通知
      try:
          from scripts.pipeline.send_workflow_notification import send_notification
          send_notification("xcnstock_daily_report", status, message)
          logger.info("通知已发送")
      except Exception as e:
          logger.error(f"通知发送失败: {e}")
    timeout: PT5M

triggers:
  - id: daily_report_schedule
    type: io.kestra.core.models.triggers.types.Schedule
    cron: "0 21 * * 1-5"  # 调整为21:00，在evening_pipeline(20:00)完成后执行
    timezone: Asia/Shanghai
    disabled: false
