id: xcnstock_post_market_analysis
namespace: xcnstock

description: |
  XCNStock 盘后分析层工作流
  负责指标计算、复盘分析、选股验证
  被 post_market_pipeline 调用

labels:
  env: production
  project: xcnstock
  type: post_market_analysis

variables:
  project_root: /projects/xxxcnstock
  python_path: "{{ vars.project_root }}"
  log_level: INFO

inputs:
  - id: trade_date
    type: STRING
    defaults: "{{ trigger.date ?? now() | date('yyyy-MM-dd') }}"
    description: 交易日期

tasks:
  - id: calculate_cvd
    type: io.kestra.plugin.scripts.python.Script
    description: CVD指标计算
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
    beforeCommands:
      - pip install polars pandas pyarrow -q
    script: |
      import sys, os, subprocess, logging
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.cvd")
      logger.info("阶段: CVD指标计算")
      result = subprocess.run(
          ["python3", "scripts/calculate_cvd.py"],
          capture_output=True, text=True, timeout=600
      )
      logger.info(result.stdout)
    timeout: PT10M

  - id: market_review
    type: io.kestra.plugin.scripts.python.Script
    description: 当日复盘分析
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
      LOG_LEVEL: "{{ vars.log_level }}"
    beforeCommands:
      - pip install polars pandas pyarrow -q
    script: |
      import sys, os, subprocess, logging
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.market_review")
      logger.info("阶段: 当日复盘分析")
      result = subprocess.run(
          ["python3", "scripts/pipeline/daily_review.py"],
          capture_output=True, text=True, timeout=900
      )
      logger.info(result.stdout)
    timeout: PT15M

  - id: picks_review
    type: io.kestra.plugin.scripts.python.Script
    description: 选股复盘
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
    beforeCommands:
      - pip install pandas -q
    script: |
      import sys, os, subprocess, logging
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.picks_review")
      logger.info("阶段: 选股复盘")
      result = subprocess.run(
          ["python3", "scripts/pipeline/stock_pick.py"],
          capture_output=True, text=True, timeout=600
      )
      logger.info(result.stdout)
    timeout: PT10M
    allowFailure: true

  - id: drawdown_analysis
    type: io.kestra.plugin.scripts.python.Script
    description: 回撤分析
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
    beforeCommands:
      - pip install pandas -q
    script: |
      import sys, os, subprocess, logging
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.drawdown")
      logger.info("阶段: 回撤分析")
      result = subprocess.run(
          ["python3", "scripts/pipeline/drawdown_analyzer.py"],
          capture_output=True, text=True, timeout=300
      )
      logger.info(result.stdout)
    timeout: PT5M
    allowFailure: true

  - id: daily_selection_review
    type: io.kestra.plugin.scripts.python.Script
    description: 每日选股复盘
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
    beforeCommands:
      - pip install pandas -q
    script: |
      import sys, os, subprocess, logging
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.selection_review")
      logger.info("阶段: 每日选股复盘")
      result = subprocess.run(
          ["python3", "scripts/pipeline/daily_stock_selection_review.py", "--all"],
          capture_output=True, text=True, timeout=1800
      )
      logger.info(result.stdout)
    timeout: PT30M
    allowFailure: true

  - id: notify_analysis_complete
    type: io.kestra.core.tasks.flows.Subflow
    description: 通知分析层完成
    flowId: xcnstock_notification
    namespace: xcnstock
    inputs:
      workflow_name: "xcnstock_post_market_analysis"
      status: "success"
      message: "盘后分析层执行完成"
    allowFailure: true
