id: xcnstock_post_market_report
namespace: xcnstock

description: |
  XCNStock 盘后报告层工作流
  负责报告生成、推送、跟踪更新
  被 post_market_pipeline 调用

labels:
  env: production
  project: xcnstock
  type: post_market_report

variables:
  project_root: /projects/xxxcnstock
  python_path: "{{ vars.project_root }}"
  log_level: INFO

inputs:
  - id: trade_date
    type: STRING
    defaults: "{{ trigger.date ?? now() | date('yyyy-MM-dd') }}"
    description: 交易日期

tasks:
  - id: review_report
    type: io.kestra.plugin.scripts.python.Script
    description: 推送完整复盘报告
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
      LOG_LEVEL: "{{ vars.log_level }}"
    beforeCommands:
      - pip install pandas requests -q
    script: |
      import sys, os, subprocess, logging
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.review_report")
      logger.info("阶段: 推送完整复盘报告")
      result = subprocess.run(
          ["python3", "scripts/send_review_report.py"],
          capture_output=True, text=True, timeout=600
      )
      logger.info(result.stdout)
    timeout: PT10M
    allowFailure: true

  - id: review_brief
    type: io.kestra.plugin.scripts.python.Script
    description: 推送精简复盘快报
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
    beforeCommands:
      - pip install pandas requests -q
    script: |
      import sys, os, subprocess, logging
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.review_brief")
      logger.info("阶段: 推送精简复盘快报")
      result = subprocess.run(
          ["python3", "scripts/pipeline/morning_push.py"],
          capture_output=True, text=True, timeout=300
      )
      logger.info(result.stdout)
    timeout: PT5M
    allowFailure: true

  - id: update_tracking
    type: io.kestra.plugin.scripts.python.Script
    description: 更新推荐股票跟踪
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
    beforeCommands:
      - pip install pandas -q
    script: |
      import sys, os, subprocess, logging
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.update_tracking")
      logger.info("阶段: 更新推荐股票跟踪")
      result = subprocess.run(
          ["python3", "scripts/pipeline/update_tracking.py"],
          capture_output=True, text=True, timeout=600
      )
      logger.info(result.stdout)
    timeout: PT10M
    allowFailure: true

  - id: evening_monitoring_summary
    type: io.kestra.plugin.scripts.python.Script
    description: 盘后监控摘要
    runner: PROCESS
    env:
      PYTHONPATH: "{{ vars.python_path }}"
    beforeCommands:
      - pip install pandas -q
    script: |
      import sys, os, subprocess, logging
      sys.path.insert(0, "{{ vars.project_root }}")
      os.chdir("{{ vars.project_root }}")
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger("kestra.evening_monitoring")
      logger.info("阶段: 盘后监控摘要")
      result = subprocess.run(
          ["python3", "scripts/monitoring_dashboard.py", "--email"],
          capture_output=True, text=True, timeout=60
      )
      logger.info(result.stdout)
    timeout: PT1M
    allowFailure: true

  - id: notify_report_complete
    type: io.kestra.core.tasks.flows.Subflow
    description: 通知报告层完成
    flowId: xcnstock_notification
    namespace: xcnstock
    inputs:
      workflow_name: "xcnstock_post_market_report"
      status: "success"
      message: "盘后报告层执行完成"
    allowFailure: true
